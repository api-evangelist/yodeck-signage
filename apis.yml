aid: yodeck-signage
url: https://raw.githubusercontent.com/api-evangelist/yodeck-signage/refs/heads/main/apis.yml
name: Yodeck
kind: company
description: Yodeck is a cloud-based digital signage platform for managing screens
  and content at scale, typically on Raspberry Pi based players. It lets teams upload
  and organize media, build playlists and multi-zone layouts, schedule content, group
  shows, and monitor and control players remotely. Alongside the web app, Yodeck
  publishes a REST API (documented at app.yodeck.com/api-docs and available to
  Premium and Enterprise plans) that programmatically manages media, playlists,
  layouts, screens/monitors, schedules, shows, and workspaces using named,
  role-scoped API tokens. Players also expose a local-only Player HTTP API for
  on-device apps. The public REST reference is behind an account login, so the
  API surface documented here is modeled from Yodeck's published resource set
  rather than copied from live spec files.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Digital Signage
