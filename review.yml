sources:
  - url: https://www.yodeck.com/docs/user-manual/introducing-yodecks-rest-api-seamless-integration-for-your-digital-signage-needs/
    type: Documentation
    note: Announces the REST API for managing media, playlists, and layouts; points to app.yodeck.com/api-docs.
  - url: https://app.yodeck.com/api-docs/
    type: APIReference
    note: Interactive API reference; login-gated, so not fetchable without an account.
  - url: https://www.yodeck.com/academy/api-token/
    type: Documentation
    note: API token generation (named, role-scoped); notes API is available for Premium and Enterprise users.
  - url: https://www.yodeck.com/features/yodeck-api/
    type: Documentation
    note: Lists API capabilities - media, playlists/layouts, workspaces, emergency alerts, remote screen control/monitoring; Premium/Enterprise only.
  - url: https://www.yodeck.com/docs/user-manual/player-http-api/
    type: Documentation
    note: Player HTTP API bound to 127.0.0.1:8080 (local only); /device, /request, /storage. Not public, not WebSocket.
  - url: https://www.yodeck.com/docs/user-manual/how-is-yodeck-priced/
    type: Documentation
    note: Per-screen pricing - free single screen, Basic $8, Premium $12, Enterprise $16 per screen per month.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. Yodeck's public programmatic surface
    is request/response REST (account REST API), gated to Premium/Enterprise and
    documented behind login, plus a local-only Player HTTP API. No AsyncAPI
    document was created because there is no public server-push transport
    (WebSocket or SSE) to model. The OpenAPI and collections in this repo are
    modeled from Yodeck's documented resource set (endpointsModeled: true), not
    copied from the login-gated official spec.
