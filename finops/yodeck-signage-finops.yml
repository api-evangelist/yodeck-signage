description: >-
  FinOps view of Yodeck spend. Yodeck bills per registered screen per month
  (Basic, Premium, Enterprise tiers), with a free single-screen tier. Cost scales
  directly with the number of registered screens, not with API call volume - the
  REST API is a feature of the Premium and Enterprise plans rather than a
  separately metered service. The dominant cost lever is the count and tier of
  registered screens; annual billing bundles free player hardware per screen.
notes: >-
  Per-screen rates follow Yodeck's April 1, 2026 pricing update; confirm current
  rates and any custom Enterprise quote (over 50 screens) with Yodeck sales.
  API usage is not separately metered on public pricing.
