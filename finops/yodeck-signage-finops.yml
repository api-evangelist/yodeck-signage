meters:
- name: registered_screens
  description: Number of registered screens billed per month at the plan's per-screen rate.
  unit: screens
  aggregation: sum
  dimensions:
  - account
  - workspace
  - plan
- name: plan_tier
  description: The plan tier (Basic, Premium, Enterprise) that sets the per-screen rate and feature/API access.
  unit: tier
  aggregation: max
  dimensions:
  - account
principles:
- name: Visibility
  description: Track registered screen count per account and workspace, and the plan tier that sets the per-screen rate.
- name: Allocation
  description: Use workspaces to map screens to locations, teams, or clients so per-screen cost allocates cleanly.
- name: Optimization
  description: Deregister idle screens (cost is per registered screen), consolidate to the lowest tier that meets feature/API needs, and prefer annual billing for bundled free player hardware.
- name: Accountability
  description: Assign workspace owners; review monthly screen counts and tier against budget, and request a custom quote above 50 screens.
